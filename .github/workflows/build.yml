name: Build
on:
    push:
        branches: [main]
jobs:
    build:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
              with:
                  run_install: false
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'pnpm'
            - run: pnpm install
            - run: pnpm build
            - run: mkdir --parents dist/assets/_next; mv .next/static $_
            - run: cp -r public/* dist/assets
            - run: cp -r public .next/standalone
            - run: (cd .next/standalone && zip --symlinks -r - .) > dist/1village.zip
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v6
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}
            - run: aws s3 cp dist s3://${{ secrets.AWS_BUCKET_NAME }}/builds/${{ github.sha }} --recursive
