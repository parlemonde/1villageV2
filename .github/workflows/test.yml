name: Test
on: [push]
jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        strategy:
            fail-fast: false
            matrix:
                script: [test:unit --runInBand, typecheck, lint, build]
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
              with:
                  run_install: false
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'pnpm'
            - run: pnpm install
            - run: pnpm ${{ matrix.script }}
